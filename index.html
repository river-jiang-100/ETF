<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>台灣 ETF 追蹤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fff;--bg2:#f7f8fa;--bg3:#eef0f5;--bg4:#e2e6ef;
  --bdr:rgba(0,0,0,0.08);--bdr2:rgba(0,0,0,0.13);
  --tx:#1a1d2e;--tx2:#4b5068;--tx3:#9399b2;
  --ac:#2563eb;--ac2:#1d4ed8;
  --up:#16a34a;--upbg:rgba(22,163,74,0.10);
  --dn:#dc2626;--dnbg:rgba(220,38,38,0.10);
  --warn:#d97706;--warnbg:rgba(217,119,6,0.10);
  --mono:'JetBrains Mono',monospace;
  --sans:'Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg2);color:var(--tx);font-size:14px;min-height:100vh}

.hdr{background:var(--bg);border-bottom:1px solid var(--bdr);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700}
.logo-box{width:32px;height:32px;background:var(--ac);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px}
.hdr-r{display:flex;align-items:center;gap:8px}
.ts-badge{font-family:var(--mono);font-size:11px;color:var(--tx3);background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;padding:4px 10px}
.btn-ref{background:var(--ac);color:#fff;border:none;border-radius:9px;padding:8px 18px;font-size:13px;font-family:var(--sans);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s}
.btn-ref:hover{background:var(--ac2)}
.spin{animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:14px 20px;background:var(--bg);border-bottom:1px solid var(--bdr)}
.sc{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:10px 14px}
.sc-l{font-size:11px;color:var(--tx3);margin-bottom:4px}
.sc-v{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--tx)}
.sc-v.up{color:var(--up)}.sc-v.dn{color:var(--dn)}.sc-v.warn{color:var(--warn)}

.sbar{padding:7px 20px;font-size:11px;color:var(--tx3);background:var(--bg);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--up);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.main{padding:14px 20px}
.toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.sbox{position:relative;flex:1;min-width:200px}
.sbox input{width:100%;background:var(--bg);border:1px solid var(--bdr2);border-radius:8px;padding:8px 12px 8px 34px;color:var(--tx);font-size:13px;font-family:var(--sans);outline:none;transition:border .15s}
.sbox input:focus{border-color:var(--ac)}
.sbox input::placeholder{color:var(--tx3)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none;font-size:15px}
.pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:20px;border:1px solid var(--bdr2);background:var(--bg);color:var(--tx2);font-size:12px;font-family:var(--sans);cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--ac);color:var(--tx)}
.pill.on{background:var(--ac);border-color:var(--ac);color:#fff}
.psep{width:1px;height:18px;background:var(--bdr2);margin:0 2px;align-self:center;flex-shrink:0}

.tabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:12px}
.tab{padding:8px 16px;background:none;border:none;color:var(--tx3);font-size:13px;font-family:var(--sans);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
.tab:hover{color:var(--tx2)}
.tab.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:500}

.tw-box{background:var(--bg);border:1px solid var(--bdr);border-radius:12px;overflow:hidden}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:860px}
.th-grp th{background:var(--bg4);padding:5px 10px;font-size:10px;font-weight:500;color:var(--tx3);letter-spacing:.5px;border-bottom:1px solid var(--bdr);text-align:center;white-space:nowrap}
.th-grp th:first-child{text-align:left;padding-left:14px}
.th-col th{background:var(--bg3);padding:8px 10px;text-align:right;color:var(--tx3);font-weight:500;font-size:11px;letter-spacing:.3px;border-bottom:1px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s}
.th-col th:first-child{text-align:left;padding-left:14px}
.th-col th:nth-child(2){text-align:left}
.th-col th:nth-child(4){text-align:left}
.th-col th:hover{color:var(--tx)}
.th-col th.sa::after{content:" ▲";font-size:9px;opacity:.9}
.th-col th.sd::after{content:" ▼";font-size:9px;opacity:.9}
.gsep{border-left:2px solid var(--bg4)!important}

tbody tr{border-bottom:1px solid var(--bdr);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(37,99,235,0.025)}
tbody td{padding:9px 10px;text-align:right;font-family:var(--mono);font-size:12px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
tbody td:first-child{text-align:left;font-weight:500;color:var(--ac);padding-left:14px}
tbody td:nth-child(2){text-align:left;font-family:var(--sans);font-size:12px;color:var(--tx2)}
tbody td:nth-child(4){text-align:left;font-family:var(--sans);font-size:11px}

.up-t{color:var(--up)}.dn-t{color:var(--dn)}.nu-t{color:var(--tx3)}
.bdg{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;font-family:var(--mono)}
.bdg-up{background:var(--upbg);color:var(--up)}
.bdg-dn{background:var(--dnbg);color:var(--dn)}
.bdg-nu{background:var(--bg3);color:var(--tx3)}

.fav{background:none;border:none;cursor:pointer;font-size:14px;color:var(--tx3);padding:1px 3px;transition:color .12s,transform .1s;line-height:1}
.fav:hover{color:var(--warn);transform:scale(1.25)}
.fav.on{color:var(--warn)}
.dot6{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle;margin-top:-1px}

/* 平準金 bar */
.eq-row{display:flex;align-items:center;gap:5px}
.eq-bg{height:5px;border-radius:3px;background:var(--bg3);flex:1;min-width:36px;overflow:hidden}
.eq-fill{height:100%;border-radius:3px}
.ef-0{background:var(--up)}.ef-m{background:var(--warn)}.ef-h{background:var(--dn)}
.eq-lbl{font-size:11px;font-family:var(--mono);min-width:32px;text-align:right}

.msg-cell{text-align:center;padding:44px 24px;font-size:13px;color:var(--tx3);background:var(--bg)}
.spinner{width:24px;height:24px;border:3px solid var(--bg3);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}

.footer{text-align:center;padding:18px;color:var(--tx3);font-size:11px;border-top:1px solid var(--bdr);margin-top:20px;background:var(--bg);line-height:1.9}
.footer a{color:var(--ac);text-decoration:none}

@media(max-width:700px){
  .stats{grid-template-columns:repeat(3,1fr)}
  .hdr,.main,.stats,.sbar{padding-left:14px;padding-right:14px}
  .ts-badge{display:none}
}
</style>
</head>

<header class="hdr">

</div>

<div class="main">

      <table>
        <thead>

            <th colspan="3">淨值 · 市價 · 折溢價</th>
            <th colspan="2" class="gsep">漲跌 / 量</th>
            <th colspan="3" class="gsep">最近配息 + 平準金</th>

            <th onclick="sb('name')">名稱</th>

            <th onclick="sb('issuer')">投信</th>
            <th onclick="sb('nav')">淨值</th>
            <th onclick="sb('price')">市價</th>
            <th onclick="sb('spPct')">折溢價%</th>
            <th onclick="sb('chg')" class="gsep">漲跌%</th>
            <th onclick="sb('vol')">量(張)</th>
            <th onclick="sb('eqPct')" class="gsep">平準金%</th>
            <th onclick="sb('divAmt')">配息/單位</th>
            <th onclick="sb('exDate')">除息日</th>
          </tr>
        </thead>
        <tbody id="tbody">

          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

/* ════════ State ════════ */
let etfs=[], favs=new Set(), curTab='all', curCat='全部', curIssuer='全部', sk='vol', sd=-1;
try{favs=new Set(JSON.parse(localStorage.getItem('etf-favs')||'[]'));}catch(e){}
function saveFavs(){try{localStorage.setItem('etf-favs',JSON.stringify([...favs]));}catch(e){}}

/* ════════ Google Sheets CSV 解析 ════════ */
async function loadFromSheets(url){
  const r=await fetch(url);
  const text=await r.text();
  const lines=text.trim().split('\n');
  const map={};
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(',').map(s=>s.trim().replace(/^"|"$/g,''));
    if(cols.length<4) continue;
    const code=cols[0].trim();
    if(!code) continue;
    map[code]={
      price:parseFloat(cols[1])||null,
      chg:parseFloat(cols[2])||null,
      vol:parseInt(cols[3])||0,
      nav:parseFloat(cols[4])||null,
    };
  }
  return map;
}

/* ════════ 主載入 ════════ */
async function loadData(){
  document.getElementById('btn-ref').disabled=true;
  document.getElementById('ri').className='spin';

  // 先用內建資料快速渲染
  buildFromDB();

  // 若有設定 Google Sheets URL，嘗試抓取更新的價格
  if(SHEET_CSV_URL){
    try{
      document.getElementById('smsg').textContent='正在從 Google Sheets 更新報價…';
      const sheetData=await loadFromSheets(SHEET_CSV_URL);
      etfs=etfs.map(e=>{
        const s=sheetData[e.code];
        if(!s) return e;
        const price=s.price||e.price;
        const nav=s.nav||e.nav;
        const sp=(price&&nav)?+(price-nav).toFixed(2):e.sp;
        const spPct=(sp&&nav)?+(sp/nav*100).toFixed(2):e.spPct;
        return{...e,price,nav,chg:s.chg??e.chg,vol:s.vol||e.vol,sp,spPct};
      });
      document.getElementById('smsg').textContent='資料已從 Google Sheets 更新 · '+new Date().toLocaleTimeString('zh-TW');
    }catch(err){
      document.getElementById('smsg').textContent='Google Sheets 載入失敗，顯示內建資料 · '+err.message;
    }
  }

  updateTime();
  doSort(sk,false);
  document.getElementById('btn-ref').disabled=false;
  document.getElementById('ri').className='';
  document.getElementById('ri').textContent='↻';
}

function buildFromDB(){
  etfs=ETF_DB.map(([code,name,issuer,cat,nav,price,chg,vol,eqPct,divAmt,exDate])=>{
    const sp=(price&&nav)?+(price-nav).toFixed(2):null;
    const spPct=(sp!=null&&nav)?+(sp/nav*100).toFixed(2):null;
    return{code,name,issuer,cat,nav,price,chg,vol,sp,spPct,
      eqPct:eqPct||null,divAmt:divAmt||null,exDate:exDate||null,
      fav:favs.has(code)};
  });
  buildPills();
}

/* ════════ Render ════════ */
function render(){
  const q=(document.getElementById('q').value||'').toLowerCase().trim();
  let data=etfs.filter(e=>{
    if(curTab==='fav'&&!e.fav) return false;
    if(curTab==='up'&&(e.spPct==null||e.spPct<=0)) return false;
    if(curTab==='dn'&&(e.spPct==null||e.spPct>=0)) return false;
    if(curTab==='eq'&&(e.eqPct==null||e.eqPct<=0)) return false;
    if(curCat!=='全部'&&e.cat!==curCat) return false;
    if(curIssuer!=='全部'&&e.issuer!==curIssuer) return false;
    if(q&&!e.code.toLowerCase().includes(q)&&!e.name.toLowerCase().includes(q)) return false;
    return true;
  });

  const prem=data.filter(e=>e.spPct>0).length;
  const disc=data.filter(e=>e.spPct<0).length;
  const vsp=data.filter(e=>e.spPct!=null);
  const avg=vsp.length?vsp.reduce((a,e)=>a+e.spPct,0)/vsp.length:0;
  document.getElementById('s-n').textContent=etfs.length;
  document.getElementById('s-p').textContent=prem;
  document.getElementById('s-d').textContent=disc;
  const ae=document.getElementById('s-avg');
  ae.textContent=(avg>=0?'+':'')+avg.toFixed(2)+'%';
  ae.className='sc-v '+(avg>0?'up':avg<0?'dn':'');
  document.getElementById('s-fav').textContent=favs.size;

  const f=(v,d=2)=>v!=null?v.toFixed(d):'—';
  const pct=v=>v!=null?(v>=0?'+':'')+v.toFixed(2)+'%':'—';
  const tb=document.getElementById('tbody');

  if(!data.length){
    tb.innerHTML=`<tr><td colspan="12" class="msg-cell">沒有符合條件的 ETF</td></tr>`;
    return;
  }

  tb.innerHTML=data.map(e=>{
    const sp=e.spPct;
    const sCl=sp==null?'nu-t':sp>0?'up-t':'dn-t';
    const bCl=sp==null?'bdg-nu':sp>0?'bdg-up':'bdg-dn';
    const cCl=e.chg==null?'nu-t':e.chg>0?'up-t':'dn-t';
    const ic=IC[e.issuer]||'#888', cc=CC[e.cat]||'#888';
    let eqH='<span class="nu-t" style="font-size:11px">—</span>';
    if(e.eqPct!=null&&e.eqPct>0){
      const cls=e.eqPct>50?'ef-h':'ef-m';
      const tc=e.eqPct>50?'dn-t':'warn-t';
      eqH=`<div class="eq-row"><div class="eq-bg"><div class="eq-fill ${cls}" style="width:${Math.min(e.eqPct,100)}%"></div></div><span class="eq-lbl ${tc}">${e.eqPct.toFixed(1)}%</span></div>`;
    } else if(e.eqPct===0){
      eqH=`<div class="eq-row"><div class="eq-bg"><div class="eq-fill ef-0" style="width:0%"></div></div><span class="eq-lbl up-t">0%</span></div>`;
    }
    return `<tr>
      <td>${e.code}</td>
      <td><span class="dot6" style="background:${cc}"></span>${e.name}</td>
      <td><button class="fav${e.fav?' on':''}" onclick="toggleFav('${e.code}')">${e.fav?'★':'☆'}</button></td>
      <td><span style="color:${ic};font-weight:500">${e.issuer}</span></td>
      <td>${f(e.nav)}</td>
      <td>${f(e.price)}</td>
      <td><span class="bdg ${bCl}">${pct(sp)}</span></td>
      <td class="${cCl} gsep">${pct(e.chg)}</td>
      <td>${(e.vol||0).toLocaleString()}</td>
      <td class="gsep" style="min-width:110px">${eqH}</td>
      <td>${f(e.divAmt,3)}</td>
      <td style="font-size:11px;color:var(--tx3)">${e.exDate||'—'}</td>
    </tr>`;
  }).join('');
}

function toggleFav(code){
  const e=etfs.find(x=>x.code===code);if(!e)return;
  e.fav=!e.fav;if(e.fav)favs.add(code);else favs.delete(code);
  saveFavs();render();
}
function setTab(t,el){curTab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));el.classList.add('on');render();}
function setCat(c,el){curCat=c;document.querySelectorAll('.pill.cat').forEach(x=>x.classList.remove('on'));el.classList.add('on');render();}
function setIssuer(v,el){curIssuer=v;document.querySelectorAll('.pill.iss').forEach(x=>x.classList.remove('on'));el.classList.add('on');render();}
function sb(key){
  if(sk===key)sd*=-1;else{sk=key;sd=-1;}
  document.querySelectorAll('.th-col th').forEach(th=>th.classList.remove('sa','sd'));
  const map={code:0,name:1,issuer:3,nav:4,price:5,spPct:6,chg:7,vol:8,eqPct:9,divAmt:10,exDate:11};
  const idx=map[key];
  if(idx!=null){const th=document.querySelectorAll('.th-col th')[idx];if(th)th.classList.add(sd===1?'sa':'sd');}
  doSort(key,true);
}
function doSort(key,rr=true){
  sk=key;
  etfs.sort((a,b)=>{
    let av=a[key],bv=b[key];
    if(av==null)av=sd>0?1e9:-1e9;
    if(bv==null)bv=sd>0?1e9:-1e9;
    if(typeof av==='string')return sd*av.localeCompare(bv,'zh-TW');
    return sd*(av-bv);
  });
  if(rr)render();
}
function buildPills(){
  const cats=['全部',...Object.keys(CC).filter(c=>etfs.some(e=>e.cat===c))];
  const issuers=['全部',...new Set(etfs.map(e=>e.issuer))];
  document.getElementById('pills').innerHTML=
    cats.map(c=>`<button class="pill cat${c===curCat?' on':''}" onclick="setCat('${c}',this)">${c}</button>`).join('')+
    '<div class="psep"></div>'+
    issuers.map(v=>`<button class="pill iss${v===curIssuer?' on':''}" onclick="setIssuer('${v}',this)">${v}</button>`).join('');
}
function updateTime(){
  const n=new Date();
  document.getElementById('ts').textContent=
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')} 更新`;
}

// 自動載入
loadData();
</script>
