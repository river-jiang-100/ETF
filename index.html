<style>
:root {
  --bg: #0f1117;
  --bg2: #161822;
  --bg3: #1e2030;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --text2: #8b8fa8;
  --text3: #555870;
  --accent: #5c7cfa;
  --accent2: #3b5bdb;
  --up: #40c057;
  --up-bg: rgba(64,192,87,0.10);
  --down: #fa5252;
  --down-bg: rgba(250,82,82,0.10);
  --warn: #fab005;
  --warn-bg: rgba(250,176,5,0.10);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* Header */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.logo-icon {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.header-right {
  display: flex; align-items: center; gap: 12px;
}
.time-badge {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
}
#refresh-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  font-family: var(--sans);
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background .15s, transform .1s;
}
#refresh-btn:hover { background: var(--accent2); }
#refresh-btn:active { transform: scale(0.97); }
.spin { animation: spin .7s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Stats bar */
.stats-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.stat-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
}
.stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.stat-val { font-size: 20px; font-weight: 700; font-family: var(--mono); }
.stat-val.up { color: var(--up); }
.stat-val.down { color: var(--down); }

/* Main */
.main { padding: 16px 24px; }

/* Toolbar */
.toolbar {
  display: flex; gap: 8px; align-items: center;
  margin-bottom: 12px; flex-wrap: wrap;
}
.search-box {
  position: relative; flex: 1; min-width: 200px;
}
.search-box input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 12px 8px 36px;
  color: var(--text);
  font-size: 13px;
  font-family: var(--sans);
  outline: none;
  transition: border-color .15s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text3); }
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 15px; pointer-events: none;
}
.pills { display: flex; gap: 5px; flex-wrap: wrap; }
.pill {
  padding: 6px 12px; border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  font-size: 12px; font-family: var(--sans);
  cursor: pointer; transition: all .15s;
}
.pill:hover { border-color: var(--accent); color: var(--text); }
.pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Tabs */
.tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.tab-btn {
  padding: 9px 18px; background: none; border: none;
  color: var(--text3); font-size: 13px; font-family: var(--sans);
  cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: color .15s;
}
.tab-btn:hover { color: var(--text2); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

/* Table */
.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
table {
  width: 100%; border-collapse: collapse;
  font-size: 13px; table-layout: fixed;
}
colgroup col:nth-child(1) { width: 80px; }
colgroup col:nth-child(2) { width: 160px; }
colgroup col:nth-child(3) { width: 44px; }
colgroup col:nth-child(4),
colgroup col:nth-child(5),
colgroup col:nth-child(6) { width: 80px; }
colgroup col:nth-child(7) { width: 90px; }
colgroup col:nth-child(8) { width: 80px; }
colgroup col:nth-child(9) { width: 96px; }

thead th {
  background: var(--bg3);
  padding: 10px 10px;
  text-align: right;
  color: var(--text3);
  font-weight: 500; font-size: 11px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  transition: color .15s;
  letter-spacing: 0.3px;
}
thead th:hover { color: var(--text); }
thead th:first-child { text-align: left; border-radius: 12px 0 0 0; }
thead th:nth-child(2) { text-align: left; }
thead th:last-child { border-radius: 0 12px 0 0; }
.sort-icon { font-size: 9px; margin-left: 3px; opacity: .5; }
thead th.sort-asc .sort-icon::after { content: " ▲"; opacity: 1; }
thead th.sort-desc .sort-icon::after { content: " ▼"; opacity: 1; }
thead th:not(.sort-asc):not(.sort-desc) .sort-icon::after { content: " ⇅"; }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .1s;
  animation: rowIn .2s ease both;
}
@keyframes rowIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
tbody tr:hover { background: rgba(255,255,255,0.03); }
tbody tr:last-child { border-bottom: none; }
tbody td {
  padding: 10px 10px;
  text-align: right;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
tbody td:first-child {
  text-align: left;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
}
tbody td:nth-child(2) {
  text-align: left;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--text2);
}
.cat-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; margin-right: 6px; flex-shrink: 0;
  vertical-align: middle; margin-top: -1px;
}
.up-text { color: var(--up); }
.down-text { color: var(--down); }
.neutral-text { color: var(--text3); }
.badge {
  display: inline-block; padding: 2px 7px;
  border-radius: 5px; font-size: 11px; font-weight: 500;
  font-family: var(--mono);
}
.badge-up { background: var(--up-bg); color: var(--up); }
.badge-down { background: var(--down-bg); color: var(--down); }
.badge-neutral { background: rgba(255,255,255,0.05); color: var(--text3); }

.fav-btn {
  background: none; border: none;
  color: var(--text3); font-size: 14px;
  cursor: pointer; padding: 2px 4px;
  line-height: 1; transition: color .15s, transform .1s;
  font-family: inherit;
}
.fav-btn:hover { color: var(--warn); transform: scale(1.2); }
.fav-btn.is-fav { color: var(--warn); }

.empty-state {
  text-align: center; padding: 48px 24px;
  color: var(--text3); font-size: 13px;
  background: var(--bg2);
}
.empty-icon { font-size: 32px; margin-bottom: 10px; }

/* Footer */
.footer {
  text-align: center; padding: 24px;
  color: var(--text3); font-size: 11px;
  border-top: 1px solid var(--border);
  margin-top: 24px;
}

/* Responsive */
@media (max-width: 640px) {
  .header { padding: 0 14px; }
  .stats-bar { grid-template-columns: 1fr 1fr; padding: 10px 14px; }
  .main { padding: 12px 14px; }
  .toolbar { gap: 6px; }
  .time-badge { display: none; }
}
</style>

  {code:'00965',name:'群益台美關鍵半導體',cat:'股票型',nav:11.30,price:11.33,vol:2341},
];

let etfs = RAW.map(e => {
  const spread = +(e.price - e.nav).toFixed(2);
  const spreadPct = +((spread / e.nav) * 100).toFixed(2);
  const chgPct = +((Math.random() * 6 - 3)).toFixed(2);
  return { ...e, spread, spreadPct, chgPct, fav: false };
});

let favs = new Set();
try { favs = new Set(JSON.parse(localStorage.getItem('etf-favs') || '[]')); } catch(e) {}
etfs.forEach(e => { if (favs.has(e.code)) e.fav = true; });

let tab = 'all', cat = '全部', sortKey = 'vol', sortDir = -1;

function saveFavs() {
  try { localStorage.setItem('etf-favs', JSON.stringify([...favs])); } catch(e) {}
}

function toggleFav(code) {
  const e = etfs.find(x => x.code === code);
  if (!e) return;
  e.fav = !e.fav;
  if (e.fav) favs.add(code); else favs.delete(code);
  saveFavs(); render();
}

function setTab(t, el) {
  tab = t;
  document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setCat(c, el) {
  cat = c;
  document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  render();
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = -1; }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
  });
  const map = { code: 0, name: 1, nav: 3, price: 4, spread: 5, spreadPct: 6, chgPct: 7, vol: 8 };
  const idx = map[key];
  if (idx !== undefined) {
    const th = document.querySelectorAll('thead th')[idx];
    if (th) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  }
  render();
}

function updateStats(data) {
  const premiums = data.filter(e => e.spreadPct > 0).length;
  const discounts = data.filter(e => e.spreadPct < 0).length;
  const avg = data.length ? (data.reduce((a, e) => a + e.spreadPct, 0) / data.length) : 0;
  document.getElementById('s-total').textContent = etfs.length;
  document.getElementById('s-prem').textContent = `${premiums} / ${discounts}`;
  const avgEl = document.getElementById('s-avg');
  avgEl.textContent = (avg > 0 ? '+' : '') + avg.toFixed(2) + '%';
  avgEl.className = 'stat-val ' + (avg > 0 ? 'up' : avg < 0 ? 'down' : '');
  document.getElementById('s-fav').textContent = favs.size;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let data = etfs.filter(e => {
    if (tab === 'fav' && !e.fav) return false;
    if (tab === 'premium' && e.spreadPct <= 0) return false;
    if (tab === 'discount' && e.spreadPct >= 0) return false;
    if (cat !== '全部' && e.cat !== cat) return false;
    if (q && !e.code.toLowerCase().includes(q) && !e.name.includes(q)) return false;
    return true;
  });
  data.sort((a, b) => {
    const av = a[sortKey], bv = b[sortKey];
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * (av - bv);
  });
  updateStats(data);
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  if (!data.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = data.map((e, i) => {
    const sp = e.spreadPct;
    const spClass = sp > 0 ? 'up-text' : sp < 0 ? 'down-text' : 'neutral-text';
    const bClass = sp > 0 ? 'badge-up' : sp < 0 ? 'badge-down' : 'badge-neutral';
    const chgClass = e.chgPct > 0 ? 'up-text' : e.chgPct < 0 ? 'down-text' : 'neutral-text';
    const dot = CATS[e.cat] || '#888';
    return `<tr style="animation-delay:${i * 0.015}s">
      <td>${e.code}</td>
      <td title="${e.name}"><span class="cat-dot" style="background:${dot}"></span>${e.name}</td>
      <td><button class="fav-btn${e.fav ? ' is-fav' : ''}" onclick="toggleFav('${e.code}')">${e.fav ? '★' : '☆'}</button></td>
      <td>${e.nav.toFixed(2)}</td>
      <td>${e.price.toFixed(2)}</td>
      <td class="${spClass}">${e.spread > 0 ? '+' : ''}${e.spread.toFixed(2)}</td>
      <td><span class="badge ${bClass}">${sp > 0 ? '+' : ''}${sp.toFixed(2)}%</span></td>
      <td class="${chgClass}">${e.chgPct > 0 ? '+' : ''}${e.chgPct.toFixed(2)}%</td>
      <td>${e.vol.toLocaleString()}</td>
    </tr>`;
  }).join('');
}

function buildPills() {
  const cats = ['全部', ...Object.keys(CATS)];
  document.getElementById('cat-pills').innerHTML = cats.map(c =>
    `<button class="pill${c === cat ? ' active' : ''}" onclick="setCat('${c}',this)">${c}</button>`
  ).join('');
}

function updateTime() {
  const n = new Date();
  document.getElementById('ts').textContent =
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')} 更新`;
}

function refresh() {
  const icon = document.getElementById('ref-icon');
  icon.className = 'spin';
  etfs = etfs.map(e => {
    const jitter = 1 + (Math.random() * 0.04 - 0.02);
    const price = +(e.nav * jitter).toFixed(2);
    const spread = +(price - e.nav).toFixed(2);
    const spreadPct = +((spread / e.nav) * 100).toFixed(2);
    const chgPct = +((Math.random() * 6 - 3)).toFixed(2);
    return { ...e, price, spread, spreadPct, chgPct };
  });
  setTimeout(() => {
    icon.className = '';
    icon.textContent = '↻';
    updateTime();
    render();
  }, 800);
}

buildPills();
sortBy('vol');
updateTime();
setInterval(updateTime, 1000);
</script>
